# Server Configuration
server.port=9090
server.type=threadpool
server.threads.min=5
server.threads.max=200
server.selector.threads=2
server.services=com.example.HelloServiceImpl,com.example.UserServiceImpl
# Protocol Configuration
protocol.type=binary
protocol.strictRead=true
protocol.strictWrite=true

# Transport Configuration
transport.framed=false
transport.timeout=30000
transport.keepAlive=true

# Client Configuration
client.type=pooled
client.maxRetries=3
client.multiplexed=true
client.loadBalancer=roundRobin

# Connection Configuration
connection.timeout=30000
connection.maxConnections=10
connection.maxIdle=5
connection.maxRetries=3
connection.framed=false
connection.protocolType=binary